<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' file:; media-src 'self' file: blob:; microphone *;">
  <title>CMP22 Karaokê — Palco</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }

    #video-container { position: relative; width: 100%; height: 100%; display: none; }
    video { width: 100%; height: 100%; object-fit: contain; background: #000; }

    /* Info da música */
    #song-info { position: absolute; top: 24px; left: 0; right: 0; display: flex; justify-content: center; pointer-events: none; opacity: 0; transition: opacity 0.5s ease; }
    #song-info.visible { opacity: 1; }
    .song-info-inner { background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); border-radius: 12px; padding: 10px 24px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
    .song-title { font-size: 22px; font-weight: 700; color: #fff; }
    .song-artist { font-size: 15px; color: rgba(255,255,255,0.6); margin-top: 2px; }

    /* Próxima música */
    #next-song { position: absolute; bottom: 24px; right: 24px; pointer-events: none; opacity: 0; transition: opacity 0.5s ease; }
    #next-song.visible { opacity: 1; }
    .next-inner { background: rgba(0,0,0,0.65); backdrop-filter: blur(8px); border-radius: 10px; padding: 8px 18px; text-align: right; border: 1px solid rgba(255,255,255,0.08); }
    .next-label { font-size: 11px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px; }
    .next-title { font-size: 15px; color: rgba(255,255,255,0.75); font-weight: 600; }

    /* Tela de pontuação */
    #score-overlay { display: none; position: absolute; inset: 0; z-index: 10; background: radial-gradient(ellipse at center, #1a0030 0%, #000 70%); flex-direction: column; align-items: center; justify-content: center; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .score-label { font-size: 22px; font-weight: 600; color: rgba(255,255,255,0.4); letter-spacing: 6px; text-transform: uppercase; margin-bottom: 16px; }
    #score-number { font-size: 180px; font-weight: 900; line-height: 1; background: linear-gradient(135deg, #a855f7, #ec4899, #f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .score-pts { font-size: 24px; color: rgba(255,255,255,0.3); letter-spacing: 3px; margin-top: 8px; }
    .score-bar-container { width: 300px; height: 5px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin-top: 32px; }
    .score-bar-fill { height: 100%; background: linear-gradient(90deg, #a855f7, #ec4899); border-radius: 3px; transition: width 2s cubic-bezier(0.25, 1, 0.5, 1); width: 0%; }

    /* Tela de espera */
    #idle-screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; overflow: hidden; }
    #idle-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.9; }
    #idle-content { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; }
    .idle-logo-img { width: 700px; max-width: 75vw; animation: pulse 4s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
    .idle-subtitle { font-size: 18px; color: rgba(255,255,255,0.4); letter-spacing: 6px; text-transform: uppercase; margin-top: 24px; }
    .idle-next { margin-top: 48px; text-align: center; }
    .idle-next-label { font-size: 13px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
    .idle-next-song { font-size: 22px; color: rgba(255,255,255,0.7); font-weight: 600; }
    .idle-next-singer { font-size: 15px; color: rgba(255,255,255,0.35); margin-top: 4px; }
  </style>
</head>
<body>

<div id="score-overlay">
  <div class="score-label">Pontuação</div>
  <div id="score-number">0</div>
  <div class="score-pts">pontos</div>
  <div class="score-bar-container">
    <div class="score-bar-fill" id="score-bar-fill"></div>
  </div>
</div>

<div id="idle-screen">
  <img id="idle-bg" src="../../assets/bg-idle.png" alt="">
  <div id="idle-content">
    <img class="idle-logo-img" src="../../assets/logo-horizontal.png" alt="CMP22 Karaokê">
    <div class="idle-subtitle">PRONTO PRA CANTAR</div>
    <div class="idle-next" id="idle-next" style="display:none">
      <div class="idle-next-label">A seguir</div>
      <div class="idle-next-song" id="idle-next-title"></div>
      <div class="idle-next-singer" id="idle-next-singer"></div>
    </div>
  </div>
</div>

<div id="video-container">
  <video id="player" playsinline></video>
  <div id="song-info">
    <div class="song-info-inner">
      <div class="song-title" id="info-title"></div>
      <div class="song-artist" id="info-artist"></div>
    </div>
  </div>
  <div id="next-song">
    <div class="next-inner">
      <div class="next-label">A seguir</div>
      <div class="next-title" id="next-title"></div>
      <div class="next-singer" id="next-singer"></div>
    </div>
  </div>
</div>

<script>
  const player = document.getElementById('player');
  const idleScreen = document.getElementById('idle-screen');
  const videoContainer = document.getElementById('video-container');
  const scoreOverlay = document.getElementById('score-overlay');
  const songInfo = document.getElementById('song-info');
  let infoTimer = null;

  // ─── Pontuação ────────────────────────────────────────────────────────────
  let audioCtx = null, analyser = null, micStream = null, scoreInterval = null;
  let scoreWindows = [];

  async function startScoring() {
    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      audioCtx = new AudioContext();
      const source = audioCtx.createMediaStreamSource(micStream);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      source.connect(analyser);
      scoreWindows = [];
      const data = new Uint8Array(analyser.frequencyBinCount);
      scoreInterval = setInterval(() => {
        analyser.getByteTimeDomainData(data);
        let sum = 0;
        for (let i = 0; i < data.length; i++) { const v = (data[i] - 128) / 128; sum += v * v; }
        const rms = Math.sqrt(sum / data.length) * 255;
        scoreWindows.push(rms > 15 ? 1 : 0);
      }, 500);
    } catch(e) {
      console.log('Mic indisponivel:', e.message);
    }
  }

  function stopScoring() {
    if (scoreInterval) { clearInterval(scoreInterval); scoreInterval = null; }
    if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
    if (audioCtx) { audioCtx.close(); audioCtx = null; }
  }

  function calcScore() {
    if (!scoreWindows.length) return null;
    const ratio = scoreWindows.filter(v => v).length / scoreWindows.length;
    return Math.min(98, Math.max(40, Math.round(40 + ratio * 58)));
  }

  function showScore(score, done) {
    scoreOverlay.style.display = 'flex';
    const el = document.getElementById('score-number');
    el.textContent = '0';
    const start = performance.now();
    const duration = 2000;
    function tick(now) {
      const p = Math.min((now - start) / duration, 1);
      const eased = 1 - Math.pow(1 - p, 3);
      el.textContent = Math.round(eased * score);
      if (p < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
    setTimeout(() => { document.getElementById('score-bar-fill').style.width = score + '%'; }, 100);
    setTimeout(() => { scoreOverlay.style.display = 'none'; if (done) done(); }, 8000);
  }

  // ─── Navegação ────────────────────────────────────────────────────────────
  function showIdle(nextSong) {
    videoContainer.style.display = 'none';
    idleScreen.style.display = 'flex';
    if (nextSong) {
      document.getElementById('idle-next').style.display = 'block';
      document.getElementById('idle-next-title').textContent = nextSong.title;
      document.getElementById('idle-next-singer').textContent = nextSong.singer ? '🎤 ' + nextSong.singer : '';
    } else {
      document.getElementById('idle-next').style.display = 'none';
    }
  }

  function showVideo(song) {
    idleScreen.style.display = 'none';
    videoContainer.style.display = 'block';
    document.getElementById('info-title').textContent = song.title;
    document.getElementById('info-artist').textContent = song.artist || '';
    songInfo.classList.add('visible');
    if (infoTimer) clearTimeout(infoTimer);
    infoTimer = setTimeout(() => songInfo.classList.remove('visible'), 5000);
  }

  // ─── Eventos do main ──────────────────────────────────────────────────────
  if (window.stage) {
    window.stage.onPlay((song) => {
      scoreOverlay.style.display = 'none';
      showVideo(song);
      const p = song.filePath.replace(/\\/g, '/');
      player.src = p.startsWith('/') ? 'file://' + p : 'file:///' + p;
      player.volume = (song.volume || 80) / 100;
      player.play().catch(e => console.error('Play error:', e));
      startScoring();
    });

    window.stage.onPause(() => player.pause());
    window.stage.onResume(() => player.play());

    window.stage.onStop(() => {
      stopScoring();
      player.pause();
      player.src = '';
      scoreOverlay.style.display = 'none';
      showIdle(null);
    });

    window.stage.onSeek((t) => { player.currentTime = t; });
    window.stage.onVolume((v) => { player.volume = v / 100; });
  }

  player.addEventListener('timeupdate', () => {
    if (!player.duration) return;
    window.stage?.reportProgress({ currentTime: player.currentTime, duration: player.duration });
  });

  player.addEventListener('ended', () => {
    stopScoring();
    const score = calcScore();
    window.stage?.reportEnded();
    if (score !== null) {
      showScore(score, () => showIdle(null));
    } else {
      showIdle(null);
    }
  });

  player.addEventListener('error', (e) => console.error('Video error:', e));
</script>
</body>
</html>
